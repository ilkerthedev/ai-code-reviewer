services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - CLIENT_URL=http://localhost:5173
    volumes:
      - ./server/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: build
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
