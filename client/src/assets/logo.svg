<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="21" x2="64" y2="21" stroke="#7C3AED" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="0" y1="43" x2="64" y2="43" stroke="#7C3AED" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="21" y1="0" x2="21" y2="64" stroke="#2563EB" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="43" y1="0" x2="43" y2="64" stroke="#2563EB" stroke-opacity="0.08" stroke-width="0.5"/>

  <!-- Left code bracket < -->
  <polyline points="22,20 14,32 22,44" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)"/>

  <!-- Right code bracket > -->
  <polyline points="42,20 50,32 42,44" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)"/>

  <!-- Central eye / lens shape -->
  <ellipse cx="32" cy="32" rx="6.5" ry="6.5" fill="none" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- Neural circuit nodes around the eye -->
  <!-- Top -->
  <circle cx="32" cy="22" r="1.5" fill="#A78BFA"/>
  <line x1="32" y1="23.5" x2="32" y2="25.5" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Bottom -->
  <circle cx="32" cy="42" r="1.5" fill="#60A5FA"/>
  <line x1="32" y1="38.5" x2="32" y2="40.5" stroke="#2563EB" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Top-left -->
  <circle cx="26" cy="25" r="1.2" fill="#A78BFA" fill-opacity="0.8"/>
  <line x1="27" y1="25.8" x2="28.5" y2="27.5" stroke="#7C3AED" stroke-width="0.9" stroke-opacity="0.6"/>

  <!-- Top-right -->
  <circle cx="38" cy="25" r="1.2" fill="#60A5FA" fill-opacity="0.8"/>
  <line x1="37" y1="25.8" x2="35.5" y2="27.5" stroke="#2563EB" stroke-width="0.9" stroke-opacity="0.6"/>

  <!-- Bottom-left -->
  <circle cx="26" cy="39" r="1.2" fill="#A78BFA" fill-opacity="0.8"/>
  <line x1="27" y1="38.2" x2="28.5" y2="36.5" stroke="#7C3AED" stroke-width="0.9" stroke-opacity="0.6"/>

  <!-- Bottom-right -->
  <circle cx="38" cy="39" r="1.2" fill="#60A5FA" fill-opacity="0.8"/>
  <line x1="37" y1="38.2" x2="35.5" y2="36.5" stroke="#2563EB" stroke-width="0.9" stroke-opacity="0.6"/>

  <!-- Inner pupil / AI core -->
  <circle cx="32" cy="32" r="2.5" fill="url(#accent)" filter="url(#softglow)"/>
  <circle cx="32" cy="32" r="1.2" fill="white" fill-opacity="0.9"/>

  <!-- Scan line effect across the eye -->
  <line x1="25.5" y1="32" x2="38.5" y2="32" stroke="#A78BFA" stroke-width="0.6" stroke-opacity="0.4"/>
</svg>
