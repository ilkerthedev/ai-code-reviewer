<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Brackets -->
  <polyline points="11,10 7,16 11,22" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="21,10 25,16 21,22" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eye ring -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="url(#accent)" stroke-width="1.2"/>

  <!-- Neural nodes -->
  <circle cx="16" cy="11" r="1" fill="#A78BFA"/>
  <circle cx="16" cy="21" r="1" fill="#60A5FA"/>
  <circle cx="12.5" cy="13" r="0.8" fill="#A78BFA" fill-opacity="0.8"/>
  <circle cx="19.5" cy="13" r="0.8" fill="#60A5FA" fill-opacity="0.8"/>
  <circle cx="12.5" cy="19" r="0.8" fill="#A78BFA" fill-opacity="0.8"/>
  <circle cx="19.5" cy="19" r="0.8" fill="#60A5FA" fill-opacity="0.8"/>

  <!-- Connection lines -->
  <line x1="16" y1="12" x2="16" y2="13" stroke="#7C3AED" stroke-width="0.7" stroke-opacity="0.7"/>
  <line x1="16" y1="19" x2="16" y2="20" stroke="#2563EB" stroke-width="0.7" stroke-opacity="0.7"/>
  <line x1="13.2" y1="13.6" x2="13.9" y2="14.3" stroke="#7C3AED" stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="18.8" y1="13.6" x2="18.1" y2="14.3" stroke="#2563EB" stroke-width="0.7" stroke-opacity="0.6"/>

  <!-- Core -->
  <circle cx="16" cy="16" r="2" fill="url(#accent)"/>
  <circle cx="16" cy="16" r="0.9" fill="white" fill-opacity="0.95"/>
</svg>
